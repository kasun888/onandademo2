name: OANDA Demo 2 - Mean Reversion Bot

on:
  schedule:
    - cron: "*/5 21-23 * * 0"   # Sunday 21:00-23:59 UTC (Mon 5am-7am SGT market open)
    - cron: "*/5 * * * 1-4"     # Mon-Thu all day UTC
    - cron: "*/5 0-21 * * 5"    # Friday up to 21:00 UTC (Fri 11pm SGT market close)
  workflow_dispatch:             # Manual trigger anytime

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Mean Reversion Bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo2-logs-${{ github.run_number }}
          path: |
            trades_*.json
            performance_log.txt
          retention-days: 30
